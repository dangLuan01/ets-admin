<button nz-button nzType="primary" (click)="showCreateModal()">
  <span nz-icon nzType="plus"></span>
  Thêm mới
</button>
<nz-divider></nz-divider>
<nz-table
  #basicTable
  [nzData]="skills"
  nzBordered
  [nzFrontPagination]="false"
  [nzTotal]="total"
  [nzPageIndex]="page"
  [nzPageSize]="limit"
  (nzPageIndexChange)="onPageIndexChange($event)"
>
  <thead>
    <tr>
      <th>Mã</th>
      <th>Tên</th>
      <th>Chứng chỉ</th>
      <th>Thứ tự</th>
      <th>Trạng thái</th>
      <th>Hành động</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let data of basicTable.data">
      <td>{{ data.code }}</td>
      <td>{{ data.name }}</td>
      <td>{{ data.cert_id }}</td>
      <td>{{ data.order_index }}</td>
      <td>
        <nz-tag [nzColor]="data.status === 1 ? 'green' : 'red'">
          {{ data.status === 1 ? 'Hoạt động' : 'Không hoạt động' }}
        </nz-tag>
      </td>
      <td>
        <button
          nz-button
          nzType="primary"
          nzShape="circle"
          (click)="showEditModal(data)"
        >
          <span nz-icon nzType="edit"></span>
        </button>
        <button nz-button nzType="primary" nzDanger nzShape="circle">
          <span nz-icon nzType="delete"></span>
        </button>
      </td>
    </tr>
  </tbody>
</nz-table>
