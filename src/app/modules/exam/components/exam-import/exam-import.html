<nz-upload
  [(nzFileList)]="fileList"
  [nzBeforeUpload]="beforeUpload"
>
  <button nz-button>
    <span nz-icon nzType="upload"></span>
    Select File
  </button>
</nz-upload>
<button
  nz-button
  (click)="handleUpload()"
  [disabled]="fileList.length === 0"
  [nzLoading]="uploading"
  style="margin-top: 16px"
>
  {{ uploading ? 'Uploading' : 'Start Upload' }}
</button>
