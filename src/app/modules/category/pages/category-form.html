<section>
  <h2>{{ isEdit() ? 'Edit' : 'Create' }} Category</h2>
  <form (ngSubmit)="save()">
    <div>
      <label>Name</label>
      <input [(ngModel)]="category().name" name="name" required (ngModelChange)="onNameChange($event)" />
    </div>
    <div>
      <label>Parent</label>
      <select [(ngModel)]="category().parent_id" name="parent_id">
        <option [ngValue]="null">-- None --</option>
        <ng-container *ngFor="let parent of structure()">
          <option [ngValue]="parent.id">{{ parent.name }}</option>
          <ng-container *ngFor="let child of parent.children">
            <option [ngValue]="child.id">&nbsp;&nbsp;{{ child.name }}</option>
          </ng-container>
        </ng-container>
      </select>
    </div>
    <div>
      <label>Type</label>
      <input [(ngModel)]="category().type" name="type" required />
    </div>
    <div>
      <label>Status</label>
      <select [(ngModel)]="category().status" name="status">
        <option [ngValue]="1">Active</option>
        <option [ngValue]="0">Inactive</option>
      </select>
    </div>
    <div>
      <label>Is Filterable</label>
      <select [(ngModel)]="category().is_filterable" name="is_filterable">
        <option [ngValue]="1">Yes</option>
        <option [ngValue]="0">No</option>
      </select>
    </div>
    <div>
      <label>Priority</label>
      <input type="number" [(ngModel)]="category().priority" name="priority" />
    </div>
    <div>
      <label>Slug</label>
      <input [(ngModel)]="category().slug" name="slug" />
    </div>
    <button type="submit" [disabled]="loading()">{{ isEdit() ? 'Update' : 'Create' }}</button>
  </form>
</section>
