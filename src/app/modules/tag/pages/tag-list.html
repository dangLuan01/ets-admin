<div class="header-container">
    <h2>Danh sách Tag</h2>
    <button nz-button nzType="primary" (click)="showCreateModal()">
        <i nz-icon nzType="plus"></i>
        Thêm mới
    </button>
</div>
<nz-divider></nz-divider>
<nz-table #basicTable [nzData]="tags" [nzTotal]="total" [nzPageSize]="limit" (nzPageIndexChange)="onPageIndexChange($event)">
    <thead>
        <tr>
            <th>Tên</th>
            <th>Slug</th>
            <th>Trạng thái</th>
            <th>Hành động</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let data of basicTable.data">
            <td>{{ data.name }}</td>
            <td>{{ data.slug }}</td>
            <td>
                <nz-tag [nzColor]="data.status === 1 ? 'green' : 'red'">
                    {{ data.status === 1 ? 'Hoạt động' : 'Không hoạt động' }}
                </nz-tag>
            </td>
            <td>
                <button
                    nz-button
                    nzType="primary"
                    nzShape="circle"
                    (click)="showEditModal(data)"
                    >
                    <span nz-icon nzType="edit"></span>
                </button>
                <button nz-button nzType="primary" nzDanger nzShape="circle">
                    <span nz-icon nzType="delete"></span>
                </button>
            </td>
        </tr>
    </tbody>
</nz-table>
