<form nz-form [formGroup]="questionForm" (ngSubmit)="submitForm()">
  <nz-row [nzGutter]="16">
    <nz-col [nzSpan]="24">
      <nz-form-item>
        <nz-form-label>Câu hỏi</nz-form-label>
        <nz-form-control>
          <textarea nz-input formControlName="question_text" rows="2" style="width:100%"></textarea>
        </nz-form-control>
      </nz-form-item>
    </nz-col>
    <nz-col [nzSpan]="12">
      <nz-form-item>
        <nz-form-label>Ảnh minh họa</nz-form-label>
        <nz-form-control>
          <input nz-input formControlName="image_url" style="width:100%" />
        </nz-form-control>
      </nz-form-item>
    </nz-col>
    <nz-col [nzSpan]="6">
      <nz-form-item>
        <nz-form-label>Audio Start (ms)</nz-form-label>
        <nz-form-control>
          <input nz-input type="number" formControlName="audio_start_ms" style="width:100%" />
        </nz-form-control>
      </nz-form-item>
    </nz-col>
    <nz-col [nzSpan]="6">
      <nz-form-item>
        <nz-form-label>Audio End (ms)</nz-form-label>
        <nz-form-control>
          <input nz-input type="number" formControlName="audio_end_ms" style="width:100%" />
        </nz-form-control>
      </nz-form-item>
    </nz-col>
    <nz-col [nzSpan]="24">
      <nz-row [nzGutter]="16">
        <nz-col [nzSpan]="6">
          <nz-form-item>
            <nz-form-label>Đáp án A</nz-form-label>
            <nz-form-control nzErrorTip="Bắt buộc">
              <input nz-input formControlName="option_a" style="width:100%" />
            </nz-form-control>
          </nz-form-item>
        </nz-col>
        <nz-col [nzSpan]="6">
          <nz-form-item>
            <nz-form-label>Đáp án B</nz-form-label>
            <nz-form-control nzErrorTip="Bắt buộc">
              <input nz-input formControlName="option_b" style="width:100%" />
            </nz-form-control>
          </nz-form-item>
        </nz-col>
        <nz-col [nzSpan]="6">
          <nz-form-item>
            <nz-form-label>Đáp án C</nz-form-label>
            <nz-form-control nzErrorTip="Bắt buộc">
              <input nz-input formControlName="option_c" style="width:100%" />
            </nz-form-control>
          </nz-form-item>
        </nz-col>
        <nz-col [nzSpan]="6">
          <nz-form-item>
            <nz-form-label>Đáp án D</nz-form-label>
            <nz-form-control nzErrorTip="Bắt buộc">
              <input nz-input formControlName="option_d" style="width:100%" />
            </nz-form-control>
          </nz-form-item>
        </nz-col>
      </nz-row>
    </nz-col>
    <nz-col [nzSpan]="12">
      <nz-form-item>
        <nz-form-label nzRequired>Đáp án đúng</nz-form-label>
        <nz-form-control nzErrorTip="Bắt buộc">
          <nz-radio-group formControlName="correct_answer">
            <label nz-radio nzValue="A">A</label>
            <label nz-radio nzValue="B">B</label>
            <label nz-radio nzValue="C">C</label>
            <label nz-radio nzValue="D">D</label>
          </nz-radio-group>
        </nz-form-control>
      </nz-form-item>
    </nz-col>
    <nz-col [nzSpan]="6">
      <nz-form-item>
        <nz-form-label nzRequired>Sub Order</nz-form-label>
        <nz-form-control nzErrorTip="Bắt buộc">
          <input nz-input type="number" formControlName="sub_order" style="width:100%" />
        </nz-form-control>
      </nz-form-item>
    </nz-col>
    <nz-col [nzSpan]="6">
      <div style="text-align:right;margin-top:16px">
        <button type="button" nz-button (click)="cancel.emit()">Huỷ</button>
        <button type="submit" nz-button nzType="primary" [disabled]="questionForm.invalid">Lưu</button>
      </div>
    </nz-col>
  </nz-row>
</form>
